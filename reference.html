<!DOCTYPE html>
<html lang="en">
<head>
<script src="theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallingford CERT — Course Reference Materials</title>
<style>
  :root {
    --bg:#0e1208; --surface:#1a2012; --surface2:#243018; --border:#3a5228;
    --primary:#5aaa3a; --primary-dark:#4a8f2e; --primary-light:#7ac95a;
    --text:#eef2e8; --text-muted:#8aa87a; --radius:12px;
  }
  [data-theme="light"]{
    --bg:#eef3e7; --surface:#ffffff; --surface2:#e7eedd; --border:#c2d2af;
    --primary:#41902e; --primary-dark:#317022; --primary-light:#5aaa3a;
    --text:#16210d; --text-muted:#5c6e4a; --muted:#5c6e4a;
  }
  [data-theme="light"] header{background:#e3ecd6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;flex-direction:column;}

  header{width:100%;background:#111a09;border-bottom:3px solid var(--primary);
    padding:12px 28px;display:flex;align-items:center;gap:16px;}
  .logo-wrap{display:flex;align-items:center;}
  #cert-logo{height:54px;width:auto;}
  .logo-badge{background:var(--primary);color:#000;font-weight:900;font-size:1.1rem;
    letter-spacing:.1em;padding:6px 12px;border-radius:6px;}
  header h1{font-size:1.2rem;font-weight:700;color:var(--primary);}
  header p{font-size:0.8rem;color:var(--text-muted);}
  .home-link{margin-left:auto;color:var(--primary-light);text-decoration:none;
    font-size:0.85rem;font-weight:600;border:1px solid var(--border);
    padding:8px 15px;border-radius:8px;transition:background .15s,border-color .15s;white-space:nowrap;}
  .home-link:hover{background:var(--surface2);border-color:var(--primary);}
  .hdr-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .hdr-actions .home-link{margin-left:0;}
  @media (max-width:600px){ header{flex-wrap:wrap;} .hdr-actions{margin-left:0;width:100%;justify-content:center;} }

  main{flex:1;width:100%;max-width:920px;margin:0 auto;padding:34px 24px;}
  .page-hero{margin-bottom:26px;}
  .page-hero h2{font-size:1.8rem;font-weight:800;margin-bottom:8px;}
  .page-hero h2 span{color:var(--primary);}
  .page-hero p{font-size:0.92rem;color:var(--text-muted);line-height:1.55;max-width:640px;}

  .resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .resource-card{display:flex;align-items:center;gap:14px;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;
    text-decoration:none;color:inherit;transition:transform .15s,border-color .15s,box-shadow .15s;}
  .resource-card:hover{transform:translateY(-3px);border-color:var(--primary);
    box-shadow:0 10px 22px rgba(0,0,0,.4);}
  .file-icon{font-size:2rem;line-height:1;flex-shrink:0;}
  .file-name{font-size:0.98rem;font-weight:700;color:var(--primary);}
  .file-type{font-size:0.74rem;color:var(--text-muted);margin-top:2px;}
  .open-arrow{margin-left:auto;opacity:.5;font-size:0.85rem;}

  footer{text-align:center;padding:20px;color:var(--text-muted);font-size:0.76rem;
    border-top:1px solid var(--border);}
  footer span{color:var(--primary);}

  @media (max-width:600px){
    header{padding:10px 16px;flex-wrap:wrap;gap:10px;}
    #cert-logo{height:44px;}
    header h1{font-size:1.05rem;}
    header p{font-size:0.74rem;}
    .home-link{margin-left:auto;}
    main{padding:24px 16px;}
    .page-hero h2{font-size:1.5rem;}
    .page-hero p{font-size:0.88rem;}
    .resource-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img id="cert-logo" src="cert-wallingford-logo.png" alt="Wallingford CERT"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
    <div id="logo-fallback" style="display:none;align-items:center;gap:10px;">
      <div class="logo-badge">CERT</div>
    </div>
  </div>
  <div>
    <h1>Course Reference Materials</h1>
    <p>CERT Basic Training — Sections 1–8</p>
  </div>
  <div class="hdr-actions">
    <a class="home-link" href="index.html">← Menu</a>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle light or dark mode">☀️</button>
  </div>
</header>

<main>
  <div class="page-hero">
    <h2>📄 Course <span>Reference</span> Materials</h2>
    <p>The official CERT Basic Training presentation decks. Click any section to open the
       PowerPoint file in a new tab.</p>
  </div>
  <div class="resource-grid" id="resource-grid"></div>
</main>

<footer>
  <span>Wallingford CERT</span> Training Suite · Reference Library
</footer>

<script>
const RESOURCES = [
  { name:"Disaster Preparedness",          file:"section_01_unit_1_ppt_508.pptx", icon:"🏠", desc:"PPTX · Section 1" },
  { name:"Fire Safety & Utility Controls", file:"section_02_unit_2_ppt_508.pptx", icon:"🔥", desc:"PPTX · Section 2" },
  { name:"Disaster Medical Ops — Part 1",  file:"section_03_unit_3_ppt_508.pptx", icon:"🏥", desc:"PPTX · Section 3" },
  { name:"Disaster Medical Ops — Part 2",  file:"section_04_unit_4_ppt_508.pptx", icon:"🩺", desc:"PPTX · Section 4" },
  { name:"Light Search & Rescue",          file:"section_05_unit_5_ppt_508.pptx", icon:"🔍", desc:"PPTX · Section 5" },
  { name:"CERT Organization",              file:"section_06_unit_6_ppt_508.pptx", icon:"🗂️", desc:"PPTX · Section 6" },
  { name:"Disaster Psychology",            file:"section_07_unit_7_ppt_508.pptx", icon:"🧠", desc:"PPTX · Section 7" },
  { name:"Terrorism & CERT",               file:"section_08_unit_8_ppt_508.pptx", icon:"💥", desc:"PPTX · Section 8" },
];
const grid = document.getElementById('resource-grid');
RESOURCES.forEach(r => {
  const a = document.createElement('a');
  a.className = 'resource-card';
  a.href = r.file;
  a.target = '_blank';
  a.innerHTML = `
    <span class="file-icon">${r.icon}</span>
    <div>
      <div class="file-name">${r.name}</div>
      <div class="file-type">${r.desc}</div>
    </div>
    <span class="open-arrow">↗</span>`;
  grid.appendChild(a);
});
</script>
</body>
</html>
